<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        :root { --bg-color: #0b0f19; }
        body { background-color: var(--bg-color); color: #ffffff; font-family: system-ui, -apple-system, sans-serif; overflow-x: hidden; position: relative; }
        
        /* Lưới Masonry sát rạt 4px - Giữ nguyên tỉ lệ ảnh */
        .masonry-grid { columns: 1; column-gap: 4px; transition: all 0.3s ease; }
        @media (min-width: 640px) { .masonry-grid { columns: 2; column-gap: 4px; } }
        @media (min-width: 1024px) { .masonry-grid { columns: 3; column-gap: 4px; } }
        @media (min-width: 1280px) { .masonry-grid { columns: 4; column-gap: 4px; } }
        
        .masonry-item { 
            break-inside: avoid; 
            margin-bottom: 4px; 
            position: relative; 
            z-index: 1; 
            cursor: pointer; 
            overflow: hidden; /* Cắt phần ảnh thừa khi phóng to 30% */
            border-radius: 4px;
        }

        /* Hình ảnh mặc định & Hiệu ứng transition */
        .masonry-item img, .masonry-item iframe {
            width: 100%;
            height: auto;
            display: block;
            transition: transform 0.5s cubic-bezier(0.25, 1, 0.5, 1); /* Mượt mà khi zoom */
        }

        /* HOVER: Chỉ phóng to ảnh bên trong 30%, KHÔNG hiện chữ */
        @media (min-width: 1024px) {
            .masonry-item:hover img, .masonry-item:hover iframe {
                transform: scale(1.3); /* Phóng to 30% */
            }
        }
    </style>
</head>
<body>
    <header class="border-b border-gray-950 p-4 sticky top-0 bg-[#0b0f19] bg-opacity-85 backdrop-blur-md z-40">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 id="brand-title-el" class="text-xl font-bold tracking-widest text-white">PORTFOLIO</h1>
            <nav id="menu-container" class="flex gap-6 text-sm font-medium"></nav>
        </div>
    </header>
    
    <main class="max-w-7xl mx-auto p-2 py-6">
        <div id="portfolio-grid" class="masonry-grid"></div>
    </main>

    <div id="lightbox" class="fixed inset-0 bg-black/40 z-[9999] hidden flex-col items-center justify-center backdrop-blur-md transition-opacity duration-300 opacity-0" onclick="closeLightbox()">
        <button onclick="closeLightbox()" class="absolute top-6 right-8 text-white text-4xl hover:text-red-500 cursor-pointer transition z-50">&times;</button>
        <div class="relative flex flex-col items-center justify-center w-[90vw] md:w-[60vw] h-[80vh] md:h-[60vh]" onclick="event.stopPropagation()">
            <div id="lightbox-content" class="w-full h-full flex items-center justify-center relative"></div>
            <div id="lightbox-caption" class="absolute -bottom-10 text-center w-full text-yellow-500 text-lg md:text-xl font-bold tracking-widest uppercase drop-shadow-md"></div>
        </div>
    </div>

    <script>
        let config = { brandTitle: "PORTFOLIO", apiKey: "", menu: ["Tất Cả", "Hình Ảnh", "Video"], items: [] };
        
        function getEmbedLink(url) {
            const match = url.match(/\/file\/d\/([^/]+)/) || url.match(/\/d\/([^/]+)/) || url.match(/id=([^&]+)/);
            return match && match[1] ? `https://drive.google.com/thumbnail?id=${match[1]}&sz=w1600` : url;
        }

        window.onload = function() {
            const saved = localStorage.getItem('portfolio_config');
            if (saved) config = JSON.parse(saved);
            applyConfig();
        };

        function applyConfig() {
            document.getElementById('brand-title-el').innerText = config.brandTitle || "PORTFOLIO";
            const mc = document.getElementById('menu-container');
            mc.innerHTML = config.menu.map(m => `<button onclick="filterCategory('${m}')" class="hover:text-blue-400 transition cursor-pointer text-gray-400 font-medium text-sm">${m}</button>`).join('');
            
            const shuffledItems = [...config.items].sort(() => Math.random() - 0.5);
            renderPortfolio(shuffledItems);
        }

        function renderPortfolio(items) {
            const grid = document.getElementById('portfolio-grid');
            if(items.length === 0) {
                grid.innerHTML = `<div class="col-span-full text-center py-20 text-gray-500 text-sm w-full">Kho ảnh trống. Hãy vào trang quản trị để quét folder dữ liệu.</div>`;
                return;
            }

            grid.innerHTML = items.map((item) => {
                const imgUrl = getEmbedLink(item.link);
                // Loại bỏ ký tự đặc biệt
                const safeCat = item.category.replace(/'/g, "\\'").replace(/"/g, "&quot;");

                if (item.type === 'video') {
                    const videoUrl = item.link.match(/\/file\/d\/([^/]+)/) || item.link.match(/\/d\/([^/]+)/) || item.link.match(/id=([^&]+)/);
                    const embedSrc = videoUrl ? `https://drive.google.com/file/d/${videoUrl[1]}/preview` : item.link;
                    const safeEmbed = embedSrc.replace(/'/g, "\\'");
                    
                    return `
                        <div class="masonry-item portfolio-card bg-black shadow-sm group" onclick="openLightbox('${safeEmbed}', '${safeCat}', 'video')">
                            <div class="relative w-full aspect-video bg-black flex items-center justify-center h-full">
                                <iframe src="${embedSrc}" class="border-0 pointer-events-none" allow="autoplay"></iframe>
                                <div class="absolute inset-0 bg-transparent z-10"></div>
                            </div>
                        </div>
                    `;
                } else {
                    const safeImgUrl = imgUrl.replace(/'/g, "\\'");
                    return `
                        <div class="masonry-item portfolio-card bg-black shadow-sm group" onclick="openLightbox('${safeImgUrl}', '${safeCat}', 'image')">
                            <div class="relative bg-black flex items-center justify-center h-full">
                                <img src="${imgUrl}" referrerpolicy="no-referrer" onerror="this.src='https://placehold.co/600x400/1f2937/9ca3af?text=Error'">
                            </div>
                        </div>
                    `;
                }
            }).join('');
        }

        function filterCategory(cat) {
            if (cat === 'Tất Cả' || cat === 'All') {
                const shuffled = [...config.items].sort(() => Math.random() - 0.5);
                renderPortfolio(shuffled);
            } else {
                const filtered = config.items.filter(i => i.category.toLowerCase() === cat.toLowerCase());
                renderPortfolio(filtered);
            }
        }

        /* LOGIC ĐIỀU KHIỂN HỘP ĐÈN (POPUP) */
        function openLightbox(src, category, type) {
            const lb = document.getElementById('lightbox');
            const content = document.getElementById('lightbox-content');
            const caption = document.getElementById('lightbox-caption');

            lb.classList.remove('hidden');
            setTimeout(() => lb.classList.remove('opacity-0'), 10);

            if (type === 'video') {
                content.innerHTML = `<iframe src="${src}" class="w-full h-full border-0 rounded shadow-2xl" allow="autoplay; fullscreen"></iframe>`;
            } else {
                content.innerHTML = `<img src="${src}" class="max-w-full max-h-full object-contain rounded shadow-2xl">`;
            }
            
            // Format chữ: Chỉ hiện TÊN FOLDER
            caption.innerHTML = `[ ${category} ]`;
        }

        function closeLightbox() {
            const lb = document.getElementById('lightbox');
            lb.classList.add('opacity-0');
            setTimeout(() => {
                lb.classList.add('hidden');
                document.getElementById('lightbox-content').innerHTML = '';
            },
