<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        :root { --bg-color: #0b0f19; }
        body { background-color: var(--bg-color); color: #ffffff; font-family: system-ui, -apple-system, sans-serif; overflow-x: hidden; }
        
        /* Cấu hình lưới Masonry so le */
        .masonry-grid { columns: 1; column-gap: 8px; transition: all 0.3s ease; }
        @media (min-width: 640px) { .masonry-grid { columns: 2; column-gap: 12px; } }
        @media (min-width: 1024px) { .masonry-grid { columns: 3; column-gap: 20px; } }
        @media (min-width: 1280px) { .masonry-grid { columns: 4; column-gap: 24px; } }
        
        /* Cấu hình các item ảnh mặc định */
        .masonry-item { break-inside: avoid; margin-bottom: 24px; transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1); position: relative; z-index: 1; }

        /* LỚP PHỦ TỐI NỀN 40% TOÀN MÀN HÌNH - CHỈ HIỆN KHI HOVER TRÊN WEB PC */
        @media (min-width: 1024px) {
            body::before {
                content: "";
                position: fixed;
                top: 0; left: 0; width: 100vw; height: 100vh;
                background-color: rgba(0, 0, 0, 0.4); /* Làm tối không gian xung quanh đi đúng 40% */
                z-index: 45;
                opacity: 0;
                pointer-events: none;
                transition: opacity 0.4s ease;
            }
            /* Khi rê chuột vào bất kỳ bức ảnh nào thì kích hoạt lớp phủ tối toàn màn hình */
            body:has(.masonry-item:hover)::before {
                opacity: 1;
            }
            
            /* HIỆU ỨNG ẢNH PHÓNG TO CỰC ĐẠI VÀ NỔI BẬT Ở GIỮA LUỒNG NHÌN */
            .masonry-grid .masonry-item:hover {
                z-index: 9999 !important; /* Đè lên trên lớp phủ tối và cả thanh Header */
                transform: scale(1.45) !important; /* Phóng to mạnh mẽ ra xung quanh từ tâm giữa */
                box-shadow: 0 40px 80px rgba(0, 0, 0, 0.95);
            }
        }
    </style>
</head>
<body>
    <header class="border-b border-gray-950 p-4 sticky top-0 bg-[#0b0f19] bg-opacity-85 backdrop-blur-md z-40">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 id="brand-title-el" class="text-xl font-bold tracking-widest text-white">PORTFOLIO</h1>
            <nav id="menu-container" class="flex gap-6 text-sm font-medium"></nav>
        </div>
    </header>
    <main class="max-w-7xl mx-auto p-4 py-8">
        <div id="portfolio-grid" class="masonry-grid"></div>
    </main>
    <script>
        let config = { brandTitle: "PORTFOLIO", apiKey: "", menu: ["Tất Cả", "Hình Ảnh", "Video"], items: [] };
        
        function getEmbedLink(url) {
            const match = url.match(/\/file\/d\/([^/]+)/) || url.match(/\/d\/([^/]+)/) || url.match(/id=([^&]+)/);
            // ĐÃ SỬA: Thay thế số 1 lỗi thành dấu $ chuẩn cấu trúc link ảnh Google công khai
            return match && match[1] ? `https://googleusercontent.com/profile/picture/4${match[1]}=w1600-h1600` : url;
        }

        window.onload = function() {
            const saved = localStorage.getItem('portfolio_config');
            if (saved) config = JSON.parse(saved);
            applyConfig();
        };

        function applyConfig() {
            document.getElementById('brand-title-el').innerText = config.brandTitle || "PORTFOLIO";
            const mc = document.getElementById('menu-container');
            mc.innerHTML = config.menu.map(m => `<button onclick="filterCategory('${m}')" class="hover:text-blue-400 transition cursor-pointer text-gray-400 font-medium text-sm">${m}</button>`).join('');
            
            renderPortfolio(config.items);
        }

        function renderPortfolio(items) {
            const grid = document.getElementById('portfolio-grid');
            if(items.length === 0) {
                grid.innerHTML = `<div class="col-span-full text-center py-20 text-gray-500 text-sm w-full">Kho ảnh trống. Hãy vào admin.html để quét folder nhé!</div>`;
                return;
            }

            // Danh sách khoảng cách lề ngẫu nhiên tạo độ so le trồi sụt phá cách cho bản Web PC
            const webMargins = ["10px", "60px", "25px", "85px", "5px", "45px", "75px", "15px"];

            grid.innerHTML = items.map((item, idx) => {
                const dl = getEmbedLink(item.link);
                const isPC = window.innerWidth >= 1024;
                const marginStyle = isPC ? webMargins[idx % webMargins.length] : "0px";

                return `
                    <div class="masonry-item portfolio-card bg-black rounded-sm overflow-hidden border border-transparent shadow-sm" 
                         style="margin-top: ${marginStyle};">
                        <div class="relative bg-black flex items-center justify-center overflow-hidden">
                            ${item.type === 'video' ? 
                                `<video src="${item.link.replace('/view', '/preview')}" class="w-full h-auto object-cover pointer-events-none" autoplay loop muted playsinline></video>` : 
                                `<img src="${dl}" class="w-full h-auto object-cover" referrerpolicy="no-referrer" onerror="this.src='https://placehold.co/600x400/1f2937/9ca3af?text=Error'">`
                            }
                        </div>
                    </div>
                `;
            }).join('');
        }

        function filterCategory(cat) {
            if (cat === 'Tất Cả' || cat === 'All') renderPortfolio(config.items);
            else renderPortfolio(config.items.filter(i => i.category.toLowerCase() === cat.toLowerCase()));
        }
    </script>
</body>
</html>
