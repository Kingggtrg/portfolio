<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        :root {
            --primary-color: #3b82f6;
            --bg-color: #111827;
            --text-color: #ffffff;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: sans-serif;
        }
    </style>
</head>
<body>

    <header class="border-b border-gray-800 p-4 sticky top-0 bg-gray-900 bg-opacity-90 backdrop-blur z-40">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-wider">PORTFOLIO</h1>
            <div class="flex items-center gap-6">
                <nav id="menu-container" class="flex gap-4 text-sm font-medium">
                    </nav>
                <button onclick="toggleAdmin()" class="text-xs bg-gray-800 hover:bg-gray-700 text-gray-400 hover:text-white px-2 py-1 rounded cursor-pointer">Admin</button>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-4 py-8">
        <div id="portfolio-grid" class="grid grid-cols-1 md:grid-cols-3 gap-6">
            </div>
    </main>

    <div id="admin-panel" class="fixed inset-0 bg-black bg-opacity-95 z-50 hidden overflow-y-auto p-6">
        <div class="max-w-4xl mx-auto bg-gray-900 p-6 rounded-lg border border-gray-800 mt-10">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold text-yellow-500">Bảng Điều Khiển Tùy Biến V2.0</h2>
                <button onclick="toggleAdmin()" class="bg-red-600 hover:bg-red-700 px-4 py-1 rounded text-sm cursor-pointer">Đóng</button>
            </div>

            <div id="admin-auth" class="mb-6">
                <p class="mb-2 text-sm">Nhập mật khẩu Admin (Mặc định: 123456):</p>
                <div class="flex gap-2">
                    <input type="password" id="admin-pass" class="bg-gray-800 p-2 rounded flex-1 border border-gray-700 text-white">
                    <button onclick="checkAuth()" class="bg-blue-600 hover:bg-blue-700 px-6 py-2 rounded font-bold cursor-pointer">Đăng Nhập</button>
                </div>
            </div>

            <div id="admin-content" class="hidden space-y-6">
                
                <div class="border border-gray-800 p-4 rounded bg-gray-950">
                    <h3 class="font-bold mb-3 text-sm uppercase tracking-wider text-yellow-400">Cấu Hình Google API Key (Bắt buộc để quét Folder)</h3>
                    <div class="flex gap-2">
                        <input type="text" id="cfg-api-key" class="bg-gray-800 p-2 rounded flex-1 border border-gray-700 text-xs text-white" placeholder="Dán mã AIzaSy... vào đây">
                        <button onclick="saveApiKey()" class="bg-yellow-600 hover:bg-yellow-700 px-4 py-2 rounded text-xs font-bold cursor-pointer">Lưu API Key</button>
                    </div>
                </div>

                <div class="border border-gray-800 p-4 rounded bg-gray-950">
                    <h3 class="font-bold mb-3 text-sm uppercase tracking-wider text-blue-400">1. Tùy Biến Giao Diện</h3>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div>
                            <label class="block text-xs mb-1 text-gray-400">Màu chủ đạo:</label>
                            <input type="color" id="cfg-primary" class="w-full h-10 rounded bg-transparent cursor-pointer">
                        </div>
                        <div>
                            <label class="block text-xs mb-1 text-gray-400">Màu nền web:</label>
                            <input type="color" id="cfg-bg" class="w-full h-10 rounded bg-transparent cursor-pointer">
                        </div>
                        <div>
                            <label class="block text-xs mb-1 text-gray-400">Bố cục hiển thị:</label>
                            <select id="cfg-layout" class="bg-gray-800 p-2 rounded w-full border border-gray-700 text-sm text-white">
                                <option value="grid-3">Chia 3 cột đều (Instagram)</option>
                                <option value="grid-2">Chia 2 cột to</option>
                                <option value="grid-4">Chia 4 cột nhỏ</option>
                            </select>
                        </div>
                    </div>
                </div>
