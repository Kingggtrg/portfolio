<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        :root { --bg-color: #0b0f19; }
        body { background-color: var(--bg-color); color: #ffffff; font-family: system-ui, -apple-system, sans-serif; overflow-x: hidden; position: relative; }
        
        /* Cấu hình lưới Masonry */
        .masonry-grid { columns: 1; column-gap: 8px; transition: all 0.3s ease; }
        @media (min-width: 640px) { .masonry-grid { columns: 2; column-gap: 16px; } }
        @media (min-width: 1024px) { .masonry-grid { columns: 3; column-gap: 24px; } }
        @media (min-width: 1280px) { .masonry-grid { columns: 4; column-gap: 32px; } }
        
        .masonry-item { break-inside: avoid; margin-bottom: 24px; transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); position: relative; z-index: 1; }

        /* LỚP PHỦ TỐI NỀN 40% TOÀN MÀN HÌNH - CHỈ CHẠY TRÊN WEB PC */
        @media (min-width: 1024px) {
            body::before {
                content: "";
                position: fixed;
                top: 0; left: 0; width: 100vw; height: 100vh;
                background-color: rgba(0, 0, 0, 0.4);
                z-index: 40;
                opacity: 0;
                pointer-events: none;
                transition: opacity 0.4s ease;
            }
            body:has(.masonry-item:hover)::before {
                opacity: 1;
            }
            
            /* Khi tương tác vào lưới, làm mờ dịu các ảnh xung quanh */
            .masonry-grid:hover .masonry-item {
                opacity: 0.5;
                filter: blur(0.5px);
            }
            
            /* Ảnh được chọn sáng bừng, phóng cực to 50% từ tâm giữa và nổi lên trên cùng */
            .masonry-grid .masonry-item:hover {
                opacity: 1 !important;
                filter: none !important;
                z-index: 50 !important;
                transform: scale(1.5) !important;
                box-shadow: 0 40px 80px rgba(0, 0, 0, 0.95);
            }
            
            .portfolio-card { 
                transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.4s ease, opacity 0.4s ease, filter 0.4s ease;
                transform-origin: center center;
            }
        }
    </style>
</head>
<body>
    <header class="border-b border-gray-950 p-4 sticky top-0 bg-[#0b0f19] bg-opacity-85 backdrop-blur-md z-40">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 id="brand-title-el" class="text-xl font-bold tracking-widest text-white">PORTFOLIO</h1>
            <nav id="menu-container" class="flex gap-6 text-sm font-medium"></nav>
        </div>
    </header>
    <main class="max-w-7xl mx-auto p-4 py-8">
        <div id="portfolio-grid" class="masonry-grid"></div>
    </main>
    <script>
        let config = { brandTitle: "PORTFOLIO", apiKey: "", menu: ["Tất Cả", "Hình Ảnh", "Video"], items: [] };
        
        function getEmbedLink(url) {
            const match = url.match(/\/file\/d\/([^/]+)/) || url.match(/\/d\/([^/]+)/) || url.match(/id=([^&]+)/);
            return match && match[1] ? `https://lh3.googleusercontent.com/d/${match[1]}` : url;
        }

        window.onload = function() {
            const saved = localStorage.getItem('portfolio_config');
            if (saved) config = JSON.parse(saved);
            applyConfig();
        };

        function applyConfig() {
            document.getElementById('brand-title-el').innerText = config.brandTitle || "PORTFOLIO";
            const mc = document.getElementById('menu-container');
            mc.innerHTML = config.menu.map(m => `<button onclick="filterCategory('${m}')" class="hover:text-blue-400 transition cursor-pointer text-gray-400 font-medium text-sm">${m}</button>`).join('');
            renderPortfolio(config.items);
        }

        function renderPortfolio(items) {
            const grid = document.getElementById('portfolio-grid');
            if(items.length === 0) {
                grid.innerHTML = `<div class="col-span-full text-center py-20 text-gray-500 text-sm w-full">Kho ảnh trống. Hãy vào trang quản trị để quét folder dữ liệu.</div>`;
                return;
            }

            // Khoảng cách trồi sụt ngẫu nhiên tạo bố cục so le nghệ thuật phá cách trên Web PC
            const webMargins = ["10px", "50px", "20px", "80px", "0px", "35px", "65px", "15px"];

            grid.innerHTML = items.map((item, idx) => {
                const isPC = window.innerWidth >= 1024;
                const marginStyle = isPC ? webMargins[idx % webMargins.length] : "0px";

                if (item.type === 'video') {
                    const videoUrl = item.link.match(/\/file\/d\/([^/]+)/) || item.link.match(/\/d\/([^/]+)/) || item.link.match(/id=([^&]+)/);
                    const embedSrc = videoUrl ? `https://drive.google.com/file/d/${videoUrl[1]}/preview` : item.link;
                    return `
                        <div class="masonry-item portfolio-card bg-black rounded-sm overflow-hidden border border-transparent shadow-sm" style="margin-top: ${marginStyle};">
                            <div class="relative w-full aspect-video bg-black flex items-center justify-center overflow-hidden">
                                <iframe src="${embedSrc}" class="w-full h-full border-0 pointer-events-none" allow="autoplay"></iframe>
                                <div class="absolute inset-0 bg-transparent"></div>
                            </div>
                        </div>
                    `;
                } else {
                    const imgUrl = getEmbedLink(item.link);
                    return `
                        <div class="masonry-item portfolio-card bg-black rounded-sm overflow-hidden border border-transparent shadow-sm" style="margin-top: ${marginStyle};">
                            <div class="relative bg-black flex items-center justify-center overflow-hidden">
                                <img src="${imgUrl}" class="w-full h-auto object-cover" referrerpolicy="no-referrer" onerror="this.src='https://placehold.co/600x400/1f2937/9ca3af?text=Error'">
                            </div>
                        </div>
                    `;
                }
            }).join('');
        }

        function filterCategory(cat) {
            if (cat === 'Tất Cả' || cat === 'All') renderPortfolio(config.items);
            else renderPortfolio(config.items.filter(i => i.category.toLowerCase() === cat.toLowerCase()));
        }
    </script>
</body>
</html>
