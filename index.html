<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        :root { --bg-color: #0b0f19; }
        body { background-color: var(--bg-color); color: #ffffff; font-family: system-ui, -apple-system, sans-serif; overflow-x: hidden; position: relative; }
        
        /* HỆ THỐNG LƯỚI KHÍT 4PX VÀ ÉP CHIỀU CAO ĐỂ TẠO ẢNH TO/NHỎ LỒNG NHAU */
        .complex-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            grid-auto-rows: 150px; /* Bắt buộc: Chiều cao cơ sở để tính tỷ lệ phóng to */
            gap: 4px; 
            grid-auto-flow: dense; /* Tự lấp đầy khoảng trống */
        }
        @media (min-width: 640px) { .complex-grid { grid-template-columns: repeat(3, 1fr); grid-auto-rows: 180px; } }
        @media (min-width: 1024px) { .complex-grid { grid-template-columns: repeat(4, 1fr); grid-auto-rows: 220px; } }
        @media (min-width: 1280px) { .complex-grid { grid-template-columns: repeat(5, 1fr); grid-auto-rows: 250px; } }
        
        /* Cấu hình các size ảnh ngẫu nhiên */
        .span-normal { grid-column: span 1; grid-row: span 1; }
        .span-tall { grid-column: span 1; grid-row: span 2; } /* Ảnh dọc, cao gấp đôi */
        .span-wide { grid-column: span 2; grid-row: span 1; } /* Ảnh ngang, rộng gấp đôi */
        .span-big { grid-column: span 2; grid-row: span 2; } /* Ảnh siêu to (điểm nhấn) */

        .grid-card { position: relative; overflow: hidden; cursor: pointer; width: 100%; height: 100%; border-radius: 2px; }
        .grid-card img, .grid-card iframe { width: 100%; height: 100%; object-fit: cover; border: none; pointer-events: none; }

        /* HIỆU ỨNG HOVER TỐI NỀN 40% VÀ NỔI ẢNH (WEB PC) */
        @media (min-width: 1024px) {
            body::before {
                content: ""; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
                background-color: rgba(0, 0, 0, 0.4); z-index: 40; opacity: 0; pointer-events: none; transition: opacity 0.4s ease;
            }
            body:has(.grid-card:hover)::before { opacity: 1; }
            .complex-grid:hover .grid-card { opacity: 0.5; filter: blur(0.5px); transition: all 0.3s ease; }
            .complex-grid .grid-card:hover {
                opacity: 1 !important; filter: none !important; z-index: 50 !important;
                transform: scale(1.03) !important; box-shadow: 0 20px 40px rgba(0, 0, 0, 0.8);
            }
            .grid-card .hover-info { opacity: 0; transition: opacity 0.3s ease; }
            .grid-card:hover .hover-info { opacity: 1; }
        }
    </style>
</head>
<body>
    <header class="border-b border-gray-950 p-4 sticky top-0 bg-[#0b0f19] bg-opacity-85 backdrop-blur-md z-40">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 id="brand-title-el" class="text-xl font-bold tracking-widest text-white">PORTFOLIO</h1>
            <nav id="menu-container" class="flex gap-6 text-sm font-medium"></nav>
        </div>
    </header>
    
    <main class="max-w-7xl mx-auto p-1 py-4">
        <div id="portfolio-grid" class="complex-grid"></div>
    </main>

    <div id="lightbox" class="fixed inset-0 bg-black/90 z-[9999] hidden flex-col items-center justify-center backdrop-blur-md transition-opacity duration-300 opacity-0" onclick="closeLightbox()">
        <button onclick="closeLightbox()" class="absolute top-6 right-8 text-white text-4xl hover:text-red-500 cursor-pointer transition z-50">&times;</button>
        <div class="relative flex flex-col items-center justify-center w-[90vw] md:w-[60vw] h-[80vh] md:h-[60vh]" onclick="event.stopPropagation()">
            <div id="lightbox-content" class="w-full h-full flex items-center justify-center relative"></div>
            <div id="lightbox-caption" class="absolute -bottom-10 text-center w-full text-white text-sm md:text-lg font-medium tracking-wide uppercase"></div>
        </div>
    </div>

    <script>
        let config = { brandTitle: "PORTFOLIO", apiKey: "", menu: ["Tất Cả", "Hình Ảnh", "Video"], items: [] };
        
        function getEmbedLink(url) {
            const match = url.match(/\/file\/d\/([^/]+)/) || url.match(/\/d\/([^/]+)/) || url.match(/id=([^&]+)/);
            return match && match[1] ? `https://drive.google.com/thumbnail?id=${match[1]}&sz=w1600` : url;
        }

        window.onload = function() {
            const saved = localStorage.getItem('portfolio_config');
            if (saved) config = JSON.parse(saved);
            applyConfig();
        };

        function applyConfig() {
            document.getElementById('brand-title-el').innerText = config.brandTitle || "PORTFOLIO";
            const mc = document.getElementById('menu-container');
            mc.innerHTML = config.menu.map(m => `<button onclick="filterCategory('${m}')" class="hover:text-blue-400 transition cursor-pointer text-gray-400 font-medium text-sm">${m}</button>`).join('');
            
            const shuffledItems = [...config.items].sort(() => Math.random() - 0.5);
            renderPortfolio(shuffledItems);
        }

        function renderPortfolio(items) {
            const grid = document.getElementById('portfolio-grid');
            if(items.length === 0) {
                grid.innerHTML = `<div class="col-span-full text-center py-20 text-gray-500 text-sm w-full">Kho ảnh trống. Hãy vào admin.html để quét folder nhé!</div>`;
                return;
            }

            // Tỷ lệ phân bổ: Ảnh siêu to và ảnh dọc/ngang đan xen ảnh nhỏ
            const layouts = ["span-normal", "span-tall", "span-normal", "span-big", "span-normal", "span-wide", "span-normal", "span-normal"];

            grid.innerHTML = items.map((item, idx) => {
                const imgUrl = getEmbedLink(item.link);
                const safeTitle = item.title.replace(/'/g, "\\'").replace(/"/g, "&quot;");
                const safeCat = item.category.replace(/'/g, "\\'").replace(/"/g, "&quot;");
                
                // Gán tỷ lệ khung ngẫu nhiên
                const chosenClass = layouts[idx % layouts.length];

                if (item.type === 'video') {
                    const videoUrl = item.link.match(/\/file\/d\/([^/]+)/) || item.link.match(/\/d\/([^/]+)/) || item.link.match(/id=([^&]+)/);
                    const embedSrc = videoUrl ? `https://drive.google.com/file/d/${videoUrl[1]}/preview` : item.link;
                    const safeEmbed = embedSrc.replace(/'/g, "\\'");
                    
                    return `
                        <div class="grid-card bg-black shadow-sm ${chosenClass}" onclick="openLightbox('${safeEmbed}', '${safeTitle}', '${safeCat}', 'video')">
                            <iframe src="${embedSrc}" allow="autoplay"></iframe>
                            <div class="absolute inset-0 bg-transparent"></div>
                            <div class="hover-info absolute bottom-0 left-0 w-full p-4 bg-gradient-to-t from-black/90 to-transparent z-10">
                                <p class="text-yellow-400 text-[10px] uppercase font-bold tracking-widest">${item.category}</p>
                                <p class="text-white text-xs tracking-wider">${item.title}</p>
                            </div>
                        </div>
                    `;
                } else {
                    const safeImgUrl = imgUrl.replace(/'/g, "\\'");
                    return `
                        <div class="grid-card bg-black shadow-sm ${chosenClass}" onclick="openLightbox('${safeImgUrl}', '${safeTitle}', '${safeCat}', 'image')">
                            <img src="${imgUrl}" referrerpolicy="no-referrer" onerror="this.src='https://placehold.co/600x400/1f2937/9ca3af?text=Error'">
                            <div class="hover-info absolute bottom-0 left-0 w-full p-4 bg-gradient-to-t from-black/90 to-transparent z-10">
                                <p class="text-yellow-400 text-[10px] uppercase font-bold tracking-widest">${item.category}</p>
                                <p class="text-white text-xs tracking-wider">${item.title}</p>
                            </div>
                        </div>
                    `;
                }
            }).join('');
        }

        function filterCategory(cat) {
            if (cat === 'Tất Cả' || cat === 'All') {
                const shuffled = [...config.items].sort(() => Math.random() - 0.5);
                renderPortfolio(shuffled);
            } else {
                const filtered = config.items.filter(i => i.category.toLowerCase() === cat.toLowerCase());
                renderPortfolio(filtered);
            }
        }

        /* LOGIC ĐIỀU KHIỂN POPUP 60% */
        function openLightbox(src, title, category, type) {
            const lb = document.getElementById('lightbox');
            const content = document.getElementById('lightbox-content');
            const caption = document.getElementById('lightbox-caption');

            lb.classList.remove('hidden');
            setTimeout(() => lb.classList.remove('opacity-0'), 10);

            if (type === 'video') {
                content.innerHTML = `<iframe src="${src}" class="w-full h-full border-0 rounded shadow-2xl" allow="autoplay; fullscreen"></iframe>`;
            } else {
                content.innerHTML = `<img src="${src}" class="max-w-full max-h-full object-contain rounded shadow-2xl">`;
            }
            
            caption.innerHTML = `<span class="text-yellow-500 font-bold">[ ${category} ]</span> <span class="text-gray-400">/</span> ${title}`;
        }

        function closeLightbox() {
            const lb = document.getElementById('lightbox');
            lb.classList.add('opacity-0');
            setTimeout(() => {
                lb.classList.add('hidden');
                document.getElementById('lightbox-content').innerHTML = '';
            }, 300);
        }
    </script>
</body>
</html>
